name: sandhost

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sandhost_db
      POSTGRES_USER: sandhost_user
      POSTGRES_PASSWORD: sandhost_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sandhost_user -d sandhost_db"]
      interval: 5s
      timeout: 5s
      retries: 10
