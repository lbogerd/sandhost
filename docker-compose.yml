name: sandhost

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sandhost_db
      POSTGRES_USER: sandhost_user
      POSTGRES_PASSWORD: sandhost_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U control_api -d control_api_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
